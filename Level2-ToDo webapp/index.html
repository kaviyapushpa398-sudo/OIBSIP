<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="app-wrapper">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-icon"><i class="fa-solid fa-check-double"></i></div>
      <h1 class="app-title">Smart Task Manager</h1>
      <p class="app-subtitle">Stay focused. Stay productive.</p>
    </header>

    <!-- INPUT SECTION -->
    <section class="input-section">
      <div class="input-group">
        <span class="input-icon"><i class="fa-solid fa-pen-to-square"></i></span>
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="What needs to be done?"
          autocomplete="off"
          maxlength="150"
        />
        <button id="addTaskBtn" class="btn-add" aria-label="Add Task">
          <i class="fa-solid fa-plus"></i>
          <span>Add Task</span>
        </button>
      </div>
      <p class="error-msg" id="errorMsg">
        <i class="fa-solid fa-circle-exclamation"></i> Task cannot be empty!
      </p>
    </section>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat-chip pending-chip">
        <i class="fa-regular fa-clock"></i>
        <span id="pendingCount">0</span> Pending
      </div>
      <div class="stat-divider"></div>
      <div class="stat-chip done-chip">
        <i class="fa-solid fa-circle-check"></i>
        <span id="completedCount">0</span> Completed
      </div>
    </div>

    <!-- PENDING TASKS -->
    <section class="task-section" id="pendingSection">
      <div class="section-header">
        <span class="section-label pending-label">
          <i class="fa-regular fa-hourglass-half"></i> Pending Tasks
        </span>
      </div>
      <div class="task-list" id="pendingList">
        <div class="empty-state" id="pendingEmpty">
          <i class="fa-regular fa-face-smile-wink"></i>
          <p>No pending tasks. Add your first task above!</p>
        </div>
      </div>
    </section>

    <!-- COMPLETED TASKS -->
    <section class="task-section" id="completedSection">
      <div class="section-header">
        <span class="section-label done-label">
          <i class="fa-solid fa-trophy"></i> Completed Tasks
        </span>
      </div>
      <div class="task-list" id="completedList">
        <div class="empty-state" id="completedEmpty">
          <i class="fa-regular fa-clipboard"></i>
          <p>No completed tasks yet. Keep going!</p>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="app-footer">
      <p>Crafted with <i class="fa-solid fa-heart"></i> &mdash; Smart Task Manager &copy; 2025</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
